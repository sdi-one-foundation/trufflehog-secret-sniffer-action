name: 'Secret Sniffer - TruffleHog'
description: 'Github action runs TruffleHog to detect secrets in the repository. If secrets are found, it will fail the action and notify the team via email.'
inputs:
  ses-username:
    description: 'Username for the AWS SES service to send email alerts'
    required: true
  ses-password:
    description: 'Password for the AWS SES service to send email alerts'
    required: true
runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        if [ "${{ github.event_name }}" == "push" ]; then
          echo "branch=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "SCAN_TYPE=full" >> $GITHUB_ENV
        fi
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_ENV
          echo "SCAN_TYPE=changes" >> $GITHUB_ENV
        fi

    - uses: actions/checkout@v3
      with:
        ref: ${{env.branch}}
        fetch-depth: 0

    - name: Ensure Git references are valid
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        echo "Fetching Git history and refs for PR scan..."
        git fetch --prune --no-tags origin ${{ github.event.pull_request.base.ref }} || echo "Could not fetch base ref"
        git fetch --prune --no-tags origin +refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/origin/pr/${{ github.event.pull_request.number }} || echo "Could not fetch PR head ref"

        # Verify BASE_SHA exists (needed for --since-commit flag)
        BASE_SHA="${{ github.event.pull_request.base.sha }}"

        if ! git rev-parse --quiet --verify "$BASE_SHA^{commit}" >/dev/null 2>&1; then
          echo "Warning: BASE_SHA $BASE_SHA is not valid, finding merge base..."
          BASE_SHA=$(git merge-base origin/${{ github.event.pull_request.base.ref }} HEAD 2>/dev/null || git rev-parse HEAD~10)
        fi

        echo "VALIDATED_BASE_SHA=$BASE_SHA" >> $GITHUB_ENV
        echo "Using BASE_SHA: $BASE_SHA"

    - name: Create Trufflehog Allow List File
      shell: bash
      run: cat ${{ github.action_path }}/.trufflehog-allowlist.txt >> .trufflehog-allowlist.txt

    - name: Scan for secrets
      id: trufflehog
      shell: bash
      run: |
        # Run TruffleHog to scan for secrets
        echo "Running TruffleHog to scan for secrets..."
        if [ "${{ env.SCAN_TYPE }}" == "changes" ]; then
          # For PRs, scan the git history of commits in this PR
          echo "Scanning PR commits from ${{ env.VALIDATED_BASE_SHA }} to HEAD..."

          # Use git mode with --since-commit to scan only PR commits
          # This will catch secrets even if they were added and then removed within the PR
          docker run --rm -v "$(pwd):/pwd" -w /pwd trufflesecurity/trufflehog:latest \
            git file:///pwd \
            --since-commit=${{ env.VALIDATED_BASE_SHA }} \
            --only-verified \
            --fail \
            --json > trufflehog_raw_unfiltered.txt 2>&1 || true

          echo "PR scan complete"
        else
          # For full scans (pushes to main), scan the entire git history
          echo "Running full git history scan..."
          docker run --rm -v "$(pwd):/pwd" -w /pwd trufflesecurity/trufflehog:latest \
            git file:///pwd \
            --only-verified \
            --fail \
            --json 2>/dev/null > trufflehog_raw_unfiltered.txt || true
        fi

        # Post-process to apply allowlist filtering
        echo "Looking for allowlist file..."
        ALLOWLIST_FILE=""
        if [ -f ".trufflehog-allowlist.txt" ]; then
          echo "Found allowlist file at .trufflehog-allowlist.txt"
          ALLOWLIST_FILE=".trufflehog-allowlist.txt"
        elif [ -f ".github/.trufflehog-allowlist.txt" ]; then
          echo "Found allowlist file at .github/.trufflehog-allowlist.txt"
          ALLOWLIST_FILE=".github/.trufflehog-allowlist.txt"
        elif [ -f "$GITHUB_ACTION_PATH/.trufflehog-allowlist.txt" ]; then
          echo "Using built-in allowlist from action"
          ALLOWLIST_FILE="$GITHUB_ACTION_PATH/.trufflehog-allowlist.txt"
        fi

        if [ -z "$ALLOWLIST_FILE" ]; then
          echo "No allowlist file found. Using unfiltered results."
          cp trufflehog_raw_unfiltered.txt trufflehog_raw_output.txt
        else
          # Filter results using allowlist
          echo "Filtering results using allowlist file: $ALLOWLIST_FILE"
          cat "$ALLOWLIST_FILE"

          # Create a new file for filtered output
          > trufflehog_raw_output.txt

          # Create an array of allowlist patterns (excluding comments and empty lines)
          ALLOWLIST_PATTERNS=()
          while IFS= read -r pattern || [ -n "$pattern" ]; do
            if [[ ! "$pattern" =~ ^[[:space:]]*# && -n "$pattern" ]]; then
              pattern=$(echo "$pattern" | xargs)
              pattern=$(echo "$pattern" | sed 's/\*/\.\*/g')
              ALLOWLIST_PATTERNS+=("$pattern")
              echo "Added pattern to allowlist (regex format): [$pattern]"
            fi
          done < "$ALLOWLIST_FILE"

          # Process each line of TruffleHog output (only actual findings, not log messages)
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip empty lines, non-JSON lines, and log messages (which have "level" field)
            if [[ -z "$line" || ! "$line" =~ ^\{ ]]; then
              continue
            fi
            # Skip log messages - they have "level" but no "SourceMetadata"
            if [[ "$line" == *'"level"'* ]]; then
              continue
            fi

            EXCLUDE=false
            RAW_VALUE=$(echo "$line" | jq -r '.Raw // ""' 2>/dev/null || echo "")
            REDACTED_VALUE=$(echo "$line" | jq -r '.Redacted // ""' 2>/dev/null || echo "")
            RAW_V2=$(echo "$line" | jq -r '.RawV2 // ""' 2>/dev/null || echo "")

            for pattern in "${ALLOWLIST_PATTERNS[@]}"; do
              if [[ -n "$RAW_VALUE" && "$RAW_VALUE" =~ $pattern ]]; then
                EXCLUDE=true
                break
              elif [[ -n "$REDACTED_VALUE" && "$REDACTED_VALUE" =~ $pattern ]]; then
                EXCLUDE=true
                break
              elif [[ -n "$RAW_V2" && "$RAW_V2" =~ $pattern ]]; then
                EXCLUDE=true
                break
              fi
            done

            if [ "$EXCLUDE" = false ]; then
              echo "$line" >> trufflehog_raw_output.txt
            fi
          done < trufflehog_raw_unfiltered.txt

          echo "Filtering complete. Before: $(grep -c 'SourceMetadata' trufflehog_raw_unfiltered.txt || echo 0) findings, After: $(grep -c 'SourceMetadata' trufflehog_raw_output.txt || echo 0) findings"
        fi

        # Check if we found secrets (only count lines with SourceMetadata - actual findings)
        if [ -s trufflehog_raw_output.txt ]; then
          FINDINGS_COUNT=$(grep -c 'SourceMetadata' trufflehog_raw_output.txt || echo 0)

          if [ "$FINDINGS_COUNT" -gt 0 ]; then
            echo "Found $FINDINGS_COUNT potential secrets"
            echo "TRUFFLEHOG_FOUND_SECRETS=true" >> $GITHUB_ENV

            # Process output for notification
            echo "Processing detailed TruffleHog output (found $FINDINGS_COUNT findings)..."

            # Extract only actual findings (lines with SourceMetadata, not log messages)
            grep 'SourceMetadata' trufflehog_raw_output.txt > trufflehog_findings.txt

            # Debug: Show raw findings structure
            echo "=== Raw findings structure (first 3) ==="
            head -3 trufflehog_findings.txt | jq '.' 2>/dev/null || cat trufflehog_findings.txt | head -3
            echo "=== End raw findings ==="

            # If we have findings, process them
            if [ -s trufflehog_findings.txt ]; then
              # Convert line-delimited JSON to array
              echo "[" > trufflehog_array.json
              cat trufflehog_findings.txt | tr '\n' ',' | sed 's/,$//' >> trufflehog_array.json
              echo "]" >> trufflehog_array.json

              # Process each finding to extract file and line information
              # Handle multiple possible source metadata structures
              jq 'map(
                # Try to extract file info from various possible locations
                (.SourceMetadata.Data.Git.file // .SourceMetadata.Data.Filesystem.file // .Raw // "unknown") as $file |
                (.SourceMetadata.Data.Git.line // .SourceMetadata.Data.Filesystem.line // "unknown") as $line |
                (.SourceMetadata.Data.Git.commit // "unknown") as $commit |
                (.SourceMetadata.Data.Git.email // "unknown") as $author |
                (.SourceMetadata.Data.Git.timestamp // "unknown") as $timestamp |
                {
                  "detection_time": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
                  "repository": "${{ github.repository }}",
                  "source": "TruffleHog GitHub Action",
                  "file": $file,
                  "line": $line,
                  "detector_type": (.DetectorName // "Unknown"),
                  "commit_hash": $commit,
                  "commit_author": $author,
                  "commit_date": $timestamp,
                  "message": "A secret was detected in this repository. For security reasons, the actual secret is not displayed.",
                  "recommendation": "Review this file for any sensitive information such as API keys, passwords, or private tokens."
                }
              )' trufflehog_array.json > trufflehog_output.json || true

              echo "=== Processed findings ==="
              cat trufflehog_output.json
              echo "=== End processed findings ==="

              # Check each finding to determine if it's in current files or history only
              echo "Checking if secrets are in current files or git history only..."
              > trufflehog_with_location.json
              echo "[" > trufflehog_with_location.json

              FIRST_ITEM=true
              jq -c '.[]' trufflehog_output.json | while read -r finding; do
                file=$(echo "$finding" | jq -r '.file // "unknown"')
                line=$(echo "$finding" | jq -r '.line // "1"')

                # Determine location status
                LOCATION="history_only"
                LOCATION_LABEL="📜 Git history only"

                if [ "$file" != "unknown" ] && [ -f "$file" ]; then
                  # File exists at HEAD - check if the line range still has content
                  # We can't check for exact secret (we don't have it), but we can verify the file/line exists
                  if [ "$line" != "unknown" ] && [ "$line" != "null" ]; then
                    # Check if the file has at least that many lines
                    FILE_LINES=$(wc -l < "$file" 2>/dev/null || echo "0")
                    if [ "$FILE_LINES" -ge "$line" ]; then
                      LOCATION="current_files"
                      LOCATION_LABEL="📄 Current files"
                    fi
                  else
                    # File exists but no line info - assume it's in current files
                    LOCATION="current_files"
                    LOCATION_LABEL="📄 Current files"
                  fi
                fi

                # Add location fields to the finding
                updated_finding=$(echo "$finding" | jq --arg loc "$LOCATION" --arg label "$LOCATION_LABEL" '. + {location: $loc, location_label: $label}')

                if [ "$FIRST_ITEM" = true ]; then
                  FIRST_ITEM=false
                else
                  echo "," >> trufflehog_with_location.json
                fi
                echo "$updated_finding" >> trufflehog_with_location.json
              done

              echo "]" >> trufflehog_with_location.json

              # Replace the original file
              mv trufflehog_with_location.json trufflehog_output.json

              echo "=== Findings with location info ==="
              cat trufflehog_output.json
              echo "=== End findings with location ==="
            fi
          else
            echo "No secrets found by TruffleHog"
          fi
        else
          echo "No TruffleHog output found"
        fi

        # Add secret statistics to the environment
        if [ -s trufflehog_output.json ]; then
          echo "SECRET_STATS<<EOF" >> $GITHUB_ENV
          echo "<ul>" >> $GITHUB_ENV
          jq -r 'group_by(.detector_type) | map({type: .[0].detector_type, count: length}) | .[] | "<li><strong>" + .type + ":</strong> " + (.count|tostring) + "</li>"' trufflehog_output.json >> $GITHUB_ENV
          echo "</ul>" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        fi

        # Add file statistics to the environment
        if [ -s trufflehog_output.json ]; then
          echo "FILE_STATS<<EOF" >> $GITHUB_ENV
          echo "<ul>" >> $GITHUB_ENV
          jq -r 'group_by(.file) | map({file: .[0].file, count: length}) | .[] | "<li><code>" + .file + "</code>: " + (.count|tostring) + " finding(s)</li>"' trufflehog_output.json >> $GITHUB_ENV
          echo "</ul>" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        fi

        # Add location statistics to the environment (current files vs history only)
        if [ -s trufflehog_output.json ]; then
          echo "LOCATION_STATS<<EOF" >> $GITHUB_ENV
          echo "<ul>" >> $GITHUB_ENV
          CURRENT_COUNT=$(jq '[.[] | select(.location == "current_files")] | length' trufflehog_output.json)
          HISTORY_COUNT=$(jq '[.[] | select(.location == "history_only")] | length' trufflehog_output.json)
          if [ "$CURRENT_COUNT" -gt 0 ]; then
            echo "<li>📄 <strong>In current files:</strong> $CURRENT_COUNT (requires removal from code)</li>" >> $GITHUB_ENV
          fi
          if [ "$HISTORY_COUNT" -gt 0 ]; then
            echo "<li>📜 <strong>In git history only:</strong> $HISTORY_COUNT (was committed but since removed)</li>" >> $GITHUB_ENV
          fi
          echo "</ul>" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        fi

    - name: Export findings for notification
      if: env.TRUFFLEHOG_FOUND_SECRETS == 'true'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          let findings = [];

          try {
            const outputContent = fs.readFileSync('trufflehog_output.json', 'utf8');
            findings = JSON.parse(outputContent);
            console.log("Successfully parsed findings for notification");
          } catch (error) {
            console.error("Error processing TruffleHog output:", error);
            findings = [{
              message: "Error processing TruffleHog output, but secrets were detected."
            }];
          }

          // Add findings to environment variable for email notification
          const findingsJSON = JSON.stringify(findings, null, 2);
          core.exportVariable('TRUFFLEHOG_FINDINGS', findingsJSON);

    - name: Set event type and capture commit details
      if: env.TRUFFLEHOG_FOUND_SECRETS == 'true'
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "EVENT_TYPE=Pull Request" >> $GITHUB_ENV
          echo "EVENT_URL=${{ github.event.pull_request.html_url }}" >> $GITHUB_ENV

          # Get PR commit details
          echo "COMMIT_DETAILS<<EOF" >> $GITHUB_ENV
          echo "<table>" >> $GITHUB_ENV
          echo "  <tr><td><strong>PR Title:</strong></td><td>${{ github.event.pull_request.title }}</td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>PR Number:</strong></td><td>#${{ github.event.pull_request.number }}</td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Base Commit:</strong></td><td><code>${{ github.event.pull_request.base.sha }}</code></td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Head Commit:</strong></td><td><code>${{ github.event.pull_request.head.sha }}</code></td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Commits in PR:</strong></td><td>${{ github.event.pull_request.commits }}</td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Author:</strong></td><td>${{ github.event.pull_request.user.login }}</td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Last Updated:</strong></td><td>${{ github.event.pull_request.updated_at }}</td></tr>" >> $GITHUB_ENV
          echo "</table>" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Create a list item for PR (only shown for pull requests)
          PR_LIST_ITEM='<li><a href="${{ github.event.pull_request.html_url }}">Pull Request #${{ github.event.pull_request.number }}</a></li>'

          echo "PR_LIST_ITEM<<EOF" >> $GITHUB_ENV
          echo "$PR_LIST_ITEM" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        else
          echo "EVENT_TYPE=Push to ${{ github.ref_name }} branch" >> $GITHUB_ENV
          echo "EVENT_URL=${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}" >> $GITHUB_ENV

          # Get push commit details
          echo "COMMIT_DETAILS<<EOF" >> $GITHUB_ENV
          echo "<table>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Branch:</strong></td><td>${{ github.ref_name }}</td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Commit SHA:</strong></td><td><code>${{ github.sha }}</code></td></tr>" >> $GITHUB_ENV

          # Get the commit message and author
          COMMIT_MESSAGE=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_EMAIL=$(git log -1 --pretty=format:"%ae")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ad" --date=format:"%Y-%m-%d %H:%M:%S")

          echo "  <tr><td><strong>Commit Message:</strong></td><td>${COMMIT_MESSAGE}</td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Author:</strong></td><td>${COMMIT_AUTHOR} (${COMMIT_EMAIL})</td></tr>" >> $GITHUB_ENV
          echo "  <tr><td><strong>Commit Date:</strong></td><td>${COMMIT_DATE}</td></tr>" >> $GITHUB_ENV
          echo "</table>" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "PR_LIST_ITEM=" >> $GITHUB_ENV
        fi

    - name: Post findings to PR
      if: env.TRUFFLEHOG_FOUND_SECRETS == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        github-token: ${{ github.token }}
        script: |
          const fs = require('fs');
          let findings = [];

          try {
            const outputContent = fs.readFileSync('trufflehog_output.json', 'utf8');
            findings = JSON.parse(outputContent);
          } catch (error) {
            console.error("Error processing TruffleHog output:", error);
            findings = [{
              message: "Error processing TruffleHog output, but secrets were detected."
            }];
          }

          // Build a table of findings if we have detailed information
          let secretsTable = '';
          if (findings.length > 0 && findings[0].file) {
            secretsTable = `
          | Location | File | Line | Type |
          |----------|------|------|------|
          ${findings.map(f => `| ${f.location_label || '❓ Unknown'} | \`${f.file}\` | ${f.line || 'N/A'} | ${f.detector_type || 'Unknown'} |`).join('\n')}
          `;
          }

          // Count findings by location
          const currentFilesCount = findings.filter(f => f.location === 'current_files').length;
          const historyOnlyCount = findings.filter(f => f.location === 'history_only').length;

          // Build location summary
          let locationSummary = '';
          if (historyOnlyCount > 0 || currentFilesCount > 0) {
            locationSummary = `
          ### 📍 Location Summary
          `;
            if (currentFilesCount > 0) {
              locationSummary += `- **📄 ${currentFilesCount} secret(s) in current files** - These need to be removed from your code\n`;
            }
            if (historyOnlyCount > 0) {
              locationSummary += `- **📜 ${historyOnlyCount} secret(s) in git history only** - These were committed but have since been removed. The secret was exposed in the PR commit history and should still be rotated.\n`;
            }
          }

          // Unique marker to identify TruffleHog comments
          const COMMENT_MARKER = '<!-- trufflehog-scan-results -->';

          const commentBody = `${COMMENT_MARKER}
          ## ⚠️ Security Alert: Secrets Detected by TruffleHog ⚠️
          This pull request has been scanned for secrets using TruffleHog, and sensitive information has been detected. Please review the findings below and take appropriate action to secure your repository.

          TruffleHog has detected secrets in this pull request. Please review and remove any sensitive information.
          ${locationSummary}
          ${secretsTable}

          <details>
          <summary>Details (click to expand)</summary>

          \`\`\`json
          ${JSON.stringify(findings, null, 2)}
          \`\`\`
          </details>

          **Important:** Committing secrets to a repository poses significant security risks. Please remove these secrets and consider them compromised.`;

          // Find and delete existing TruffleHog comments
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number
          });

          const existingComments = comments.filter(c => c.body.includes(COMMENT_MARKER));

          for (const comment of existingComments) {
            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id
            });
            console.log(`Deleted old TruffleHog comment (ID: ${comment.id})`);
          }

          // Create new comment
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });
          console.log('Created new TruffleHog comment');

    - name: Create GitHub Annotations for findings
      if: env.TRUFFLEHOG_FOUND_SECRETS == 'true'
      shell: bash
      run: |
        # Read the findings and create annotations
        if [ -s trufflehog_output.json ]; then
          echo "Creating GitHub annotations for findings..."

          # Process each finding to create an annotation
          jq -c '.[]' trufflehog_output.json | while read -r finding; do
            file=$(echo "$finding" | jq -r '.file // "unknown"')
            line=$(echo "$finding" | jq -r '.line // "1"')
            detector=$(echo "$finding" | jq -r '.detector_type // "Unknown"')
            commit=$(echo "$finding" | jq -r '.commit_hash // "unknown"')
            author=$(echo "$finding" | jq -r '.commit_author // "unknown"')
            location=$(echo "$finding" | jq -r '.location // "unknown"')
            location_label=$(echo "$finding" | jq -r '.location_label // "Unknown location"')
            # Extract commit date and format it
            commit_date=$(echo "$finding" | jq -r '.commit_date // "unknown"')
            # Format the date nicely if it exists
            if [ "$commit_date" != "unknown" ] && [ "$commit_date" != "null" ]; then
              commit_date=$(date -d "$commit_date" +"%Y-%m-%d" 2>/dev/null || echo "$commit_date")
            fi

            # Build location context for the message
            if [ "$location" == "history_only" ]; then
              location_msg="[GIT HISTORY ONLY - secret was committed but since removed]"
            else
              location_msg="[IN CURRENT FILES]"
            fi

            # Skip files that are "unknown" as they won't display properly
            if [ "$file" != "unknown" ] && [ "$file" != "N/A (filesystem scan)" ] && [ "${file:0:1}" != "(" ]; then
              # Create a warning annotation with date and location
              echo "::warning file=${file},line=${line}::Secret detected: ${detector} ${location_msg} - Author: ${author} - Date: ${commit_date} - Commit: ${commit:0:7}"
            else
              # For unknown locations, just output a general warning with date
              echo "::warning::Secret detected: ${detector} ${location_msg} in unknown file - Author: ${author} - Date: ${commit_date} - Commit: ${commit:0:7}"
            fi
          done
        fi

    - name: Send mail
      if: env.TRUFFLEHOG_FOUND_SECRETS == 'true'
      uses: dawidd6/action-send-mail@v5
      with:
        server_address: email-smtp.us-east-1.amazonaws.com
        server_port: 465
        secure: true
        username: ${{inputs.ses-username}}
        password: ${{inputs.ses-password}}
        subject: Secrets Found in ${{github.repository}} repository
        to: alerts+foundation@one.singledigits.com
        from: '"Foundation Alerts" <alerts+foundation@one.singledigits.com>'
        html_body: |
          <!DOCTYPE html>
          <html>
          <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
              body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                line-height: 1.6;
                color: #333;
                max-width: 800px;
                margin: 0 auto;
                padding: 20px;
              }
              .header {
                background-color: #D32F2F;
                color: white;
                padding: 20px;
                border-radius: 5px 5px 0 0;
                margin-bottom: 0;
              }
              h1, h2, h3 {
                margin-top: 0;
              }
              .content {
                background-color: #f9f9f9;
                border: 1px solid #ddd;
                border-top: none;
                padding: 20px;
                border-radius: 0 0 5px 5px;
              }
              .alert {
                background-color: #FFF3E0;
                border-left: 4px solid #FF9800;
                padding: 15px;
                margin-bottom: 20px;
              }
              .button {
                display: inline-block;
                background-color: #f1f1f1;
                color: #0366d6;
                padding: 8px 16px;
                text-decoration: none;
                border-radius: 20px;
                margin-right: 8px;
                margin-bottom: 8px;
                border: 1px solid #e1e4e8;
                font-size: 14px;
                transition: background-color 0.2s;
              }
              .button:hover {
                background-color: #e6f1ff;
                border-color: #c8e1ff;
              }
              .button.warning {
                background-color: #fff1f0;
                color: #d73a49;
                border-color: #f9d0c4;
              }
              .button.warning:hover {
                background-color: #ffdce0;
                border-color: #f9c2c2;
              }
              .link-list {
                margin-bottom: 20px;
                padding-left: 20px;
              }
              .link-list li {
                margin-bottom: 8px;
              }
              .link-list a {
