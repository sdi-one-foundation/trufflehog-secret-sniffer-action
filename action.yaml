        ignore_cert: true
        convert_markdown: true
        priority: high
        nodemailerlog: true
        nodemailerdebug: true

    - name: Scan Results Status - Exit with error if secrets found
      if: env.TRUFFLEHOG_FOUND_SECRETS == 'true'
      run: exit 1
      shell: bash

    - name: Post success message to PR
      if: github.event_name == 'pull_request' && env.TRUFFLEHOG_FOUND_SECRETS != 'true'
      uses: actions/github-script@v6
      with:
        github-token: ${{ github.token }}
        script: |
          // Unique marker to identify TruffleHog comments
          const COMMENT_MARKER = '<!-- trufflehog-scan-results -->';

          const commentBody = `${COMMENT_MARKER}
          ## ✅ Security Scan Passed

          This pull request has been scanned for secrets using TruffleHog, and no sensitive information was detected.

          ### Scan Details
          - **Repository:** ${{ github.repository }}
          - **PR Number:** #${{ github.event.pull_request.number }}
          - **Scan Time:** ${new Date().toISOString()}
          - **Result:** No secrets detected

          Good job keeping your code secure! 🔒`;

          // Find and delete existing TruffleHog comments
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number
          });

          const existingComments = comments.filter(c => c.body.includes(COMMENT_MARKER));

          for (const comment of existingComments) {
            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id
            });
            console.log(`Deleted old TruffleHog comment (ID: ${comment.id})`);
          }

          // Create new comment
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });
          console.log('Created new TruffleHog comment');
